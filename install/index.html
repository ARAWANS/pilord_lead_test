<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PiLord | Install Math Game App</title>
    <meta name="description" content="Enter your email to receive the PiLord math game test install link instantly from PiMath Studio." />
    <meta name="robots" content="index,follow" />
    <meta name="keywords" content="pimath, pilord, math game" />
    <link rel="canonical" href="https://www.pistudios.net/install/" />
    <meta property="og:title" content="PiLord | Install Math Game App" />
    <meta property="og:description" content="Enter your email to receive the PiLord math game test install link instantly from PiMath Studio." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.pistudios.net/install/" />
    <meta property="og:locale" content="en_US" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "PiLord",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Android",
        "url": "https://www.pistudios.net/install/",
        "description": "Install page for the PiLord opening test math game.",
        "keywords": "pilord, pimath, math game"
      }
    </script>
  </head>
  <body class="install-page minimal-install-page install-page-en">
    <main class="install-shell">
      <section class="install-card minimal-install-card">
        <div class="install-brand minimal-install-brand">
          <img class="brand-logo" src="../assets/images/monster_face.png" alt="PiLord icon" />
          <p class="app-name">PiLord</p>
          <h1>Install App</h1>
        </div>

        <p class="install-copy minimal-install-copy">Enter your email to receive the test app install link.</p>

        <form
          id="lead-form"
          class="simple-form minimal-form"
          novalidate
          data-lead-source="landing_page_install_en"
          data-lead-note="Instant install link request from simple install page"
          data-config-error="Landing page is not configured yet. Add Supabase URL, anon key, and install link in config.js."
          data-missing-install-link="Install link is not configured yet. Add it in config.js."
          data-invalid-email="Please enter a valid email address."
          data-sending="Preparing your install link..."
          data-duplicate="You were already registered. Your install link is ready below."
          data-success="Your install link is ready."
          data-error-fallback="Something went wrong. Please try again later."
          data-reveal-install="true"
        >
          <label for="email" class="field-label">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
          <button id="submit-button" type="submit">Get Install Link</button>
          <p id="form-status" class="form-status" role="status"></p>
        </form>

        <div id="install-result" class="install-result minimal-install-result" hidden>
          <p class="install-warning">If you have not joined the closed test yet, installation will not be available.</p>
          <a id="install-link" class="install-text-link" href="#" target="_blank" rel="noreferrer">Install Link</a>
        </div>
      </section>
    </main>

    <script src="../config.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
