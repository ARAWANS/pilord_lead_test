<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PiLord | Install App</title>
    <meta name="description" content="Enter your email to receive the PiLord test install link instantly." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body class="install-page minimal-install-page">
    <main class="install-shell">
      <section class="install-card minimal-install-card">
        <div class="install-brand minimal-install-brand">
          <img class="brand-logo" src="../assets/images/monster_face.png" alt="PiLord icon" />
          <h1>Install App</h1>
        </div>

        <p class="install-copy minimal-install-copy">Enter your email to receive the test app install link.</p>

        <form
          id="lead-form"
          class="simple-form minimal-form"
          novalidate
          data-lead-source="landing_page_install_en"
          data-lead-note="Instant install link request from simple install page"
          data-config-error="Landing page is not configured yet. Add Supabase URL, anon key, and install link in config.js."
          data-missing-install-link="Install link is not configured yet. Add it in config.js."
          data-invalid-email="Please enter a valid email address."
          data-sending="Preparing your install link..."
          data-duplicate="You were already registered. Your install link is ready below."
          data-success="Your install link is ready."
          data-error-fallback="Something went wrong. Please try again later."
          data-reveal-install="true"
        >
          <label for="email" class="field-label">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
          <p class="consent-note">* By continuing, you agree to receive the test app.</p>
          <button id="submit-button" type="submit">Get Install Link</button>
          <p id="form-status" class="form-status" role="status"></p>
        </form>

        <div id="install-result" class="install-result" hidden>
          <a id="install-link" class="primary-button install-link-button" href="#" target="_blank" rel="noreferrer">Open Install Link</a>
        </div>
      </section>
    </main>

    <script src="../config.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
