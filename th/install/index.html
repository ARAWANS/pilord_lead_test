<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PiLord | ติดตั้งเกมคณิตศาสตร์</title>
    <meta name="description" content="กรอกอีเมลเพื่อรับลิงก์ติดตั้ง PiLord เกมคณิตศาสตร์รุ่นทดสอบได้ทันทีจาก PiMath Studio" />
    <meta name="robots" content="index,follow" />
    <meta name="keywords" content="pimath, pilord, math game" />
    <link rel="canonical" href="https://www.pistudios.net/th/install/" />
    <meta property="og:title" content="PiLord | ติดตั้งเกมคณิตศาสตร์" />
    <meta property="og:description" content="กรอกอีเมลเพื่อรับลิงก์ติดตั้ง PiLord เกมคณิตศาสตร์รุ่นทดสอบได้ทันทีจาก PiMath Studio" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.pistudios.net/th/install/" />
    <meta property="og:locale" content="th_TH" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "PiLord",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Android",
        "url": "https://www.pistudios.net/th/install/",
        "description": "หน้าติดตั้งสำหรับ PiLord เกมคณิตศาสตร์รุ่น opening test.",
        "keywords": "pilord, pimath, math game"
      }
    </script>
  </head>
  <body class="install-page minimal-install-page install-page-th">
    <main class="install-shell">
      <section class="install-card minimal-install-card">
        <div class="install-brand minimal-install-brand">
          <img class="brand-logo" src="../../assets/images/monster_face.png" alt="PiLord icon" />
          <p class="app-name">PiLord</p>
          <h1>ติดตั้งแอป</h1>
        </div>

        <p class="install-copy minimal-install-copy">กรอกอีเมลเพื่อรับลิงก์ติดตั้งแอปรุ่นทดสอบ</p>

        <form
          id="lead-form"
          class="simple-form minimal-form"
          novalidate
          data-lead-source="landing_page_install_th"
          data-lead-note="Instant install link request from thai simple install page"
          data-config-error="หน้ายังไม่ได้ตั้งค่า กรุณาเพิ่ม Supabase URL, anon key และ install link ใน config.js"
          data-missing-install-link="ยังไม่ได้ตั้งค่า install link ใน config.js"
          data-invalid-email="กรุณากรอกอีเมลให้ถูกต้อง"
          data-sending="กำลังเตรียมลิงก์ติดตั้ง..."
          data-duplicate="คุณเคยลงทะเบียนแล้ว ลิงก์ติดตั้งพร้อมใช้งานด้านล่าง"
          data-success="ลิงก์ติดตั้งพร้อมใช้งานแล้ว"
          data-error-fallback="เกิดข้อผิดพลาด กรุณาลองใหม่ภายหลัง"
          data-reveal-install="true"
        >
          <label for="email" class="field-label">อีเมล</label>
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
          <button id="submit-button" type="submit">รับลิงก์ติดตั้ง</button>
          <p id="form-status" class="form-status" role="status"></p>
        </form>

        <div id="install-result" class="install-result minimal-install-result" hidden>
          <p class="install-warning">ถ้ายังไม่เคยลงทะเบียน closed test จะยังไม่สามารถติดตั้งได้</p>
          <a id="install-link" class="install-text-link" href="#" target="_blank" rel="noreferrer">ลิงก์ติดตั้ง</a>
        </div>
      </section>
    </main>

    <script src="../../config.js"></script>
    <script src="../../app.js"></script>
  </body>
</html>
