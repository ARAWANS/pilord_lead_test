<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PiLord | รับลิงก์ติดตั้ง</title>
    <meta name="description" content="กรอกอีเมลแล้วรับลิงก์ติดตั้ง PiLord closed test ได้ทันที" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles.css" />
  </head>
  <body class="install-page">
    <main class="install-shell">
      <section class="install-card">
        <div class="install-topbar">
          <nav class="lang-switch" aria-label="Language switcher">
            <a href="../../install/">English</a>
            <a class="active" href="./">ไทย</a>
          </nav>
          <a class="text-link" href="../">กลับไปหน้าโปรโมต</a>
        </div>

        <div class="install-brand">
          <img class="brand-logo" src="../../assets/images/monster_face.png" alt="PiLord icon" />
          <div>
            <p class="section-kicker">Closed Test Access</p>
            <h1>รับลิงก์ติดตั้ง</h1>
          </div>
        </div>

        <p class="install-copy">กรอกอีเมลครั้งเดียว แล้วรับลิงก์ติดตั้งจาก Play Store ได้ทันทีบนหน้านี้</p>

        <form
          id="lead-form"
          class="simple-form"
          novalidate
          data-lead-source="landing_page_install_th"
          data-lead-note="Instant install link request from thai simple install page"
          data-config-error="หน้ายังไม่ได้ตั้งค่า กรุณาเพิ่ม Supabase URL, anon key และ install link ใน config.js"
          data-missing-install-link="ยังไม่ได้ตั้งค่า install link ใน config.js"
          data-invalid-email="กรุณากรอกอีเมลให้ถูกต้อง"
          data-sending="กำลังเตรียมลิงก์ติดตั้ง..."
          data-duplicate="คุณเคยลงทะเบียนแล้ว ลิงก์ติดตั้งพร้อมใช้งานด้านล่าง"
          data-success="ลิงก์ติดตั้งพร้อมใช้งานแล้ว"
          data-error-fallback="เกิดข้อผิดพลาด กรุณาลองใหม่ภายหลัง"
          data-reveal-install="true"
        >
          <label for="email" class="field-label">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
          <button id="submit-button" type="submit">รับลิงก์</button>
          <p id="form-status" class="form-status" role="status"></p>
        </form>

        <div id="install-result" class="install-result" hidden>
          <a id="install-link" class="primary-button install-link-button" href="#" target="_blank" rel="noreferrer">เปิดลิงก์ติดตั้งบน Play Store</a>
          <p class="install-note">ควรใช้ Google account เดียวกับที่ได้รับสิทธิ์ closed test</p>
        </div>
      </section>
    </main>

    <script src="../../config.js"></script>
    <script src="../../app.js"></script>
  </body>
</html>
